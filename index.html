<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>COLORYNTH</title>
    <style>
        body {
            background-color: #1C1C1C; /* Dark Ash */
            color: #FFFFFF; /* White */

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background-color: #333;
        }
        img.logo {
            max-width: 150px;
        }
        .hero {
            background-image: url('./images/hero-banner.jpg'); /* Local image path */
            height: 400px;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .carousel, .reviews {
            margin: 20px;
        }
    </style>
</head>
<body>
    <header>
        <img src="./images/logo.png" alt="COLORYNTH Logo" class="logo"> <!-- Logo Image Tag -->
    </header>
    <section class="hero">
        <h1>Welcome to COLORYNTH</h1>
    </section>
    <div class="carousel">
        <!-- Empty carousel container for CMS -->
    </div>
    <div class="reviews">
        <!-- Empty reviews grid for CMS -->
    </div>
    <footer>
        <a href="https://drive.google.com/link-to-your-lead-magnet" target="_blank">Download your free resource!</a> <!-- Google Drive lead magnet link -->
    </footer>

    <script src="scripts/main.js"></script> <!-- Existing JavaScript for filters and dialogs -->
</body>
</html>
